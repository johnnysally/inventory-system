<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="#1a1a2e" rx="10"/>
  <g transform="translate(50, 50)">
    <!-- Package/Box icon representing inventory -->
    <rect x="-25" y="-15" width="50" height="40" fill="none" stroke="#4a9eff" stroke-width="2"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#4a9eff" stroke-width="2"/>
    <line x1="-25" y1="0" x2="-15" y2="-10" stroke="#4a9eff" stroke-width="2"/>
    <line x1="25" y1="0" x2="35" y2="-10" stroke="#4a9eff" stroke-width="2"/>
    <line x1="-15" y1="-10" x2="35" y2="-10" stroke="#4a9eff" stroke-width="2"/>
    
    <!-- SC initials -->
    <text x="0" y="15" font-size="16" font-weight="bold" fill="#4a9eff" text-anchor="middle" font-family="Arial, sans-serif">SC</text>
  </g>
</svg>